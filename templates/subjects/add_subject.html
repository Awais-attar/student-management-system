<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Add Subject</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/students.css') }}">

</head>

<body>

<div class="student-form-container">

    <div class="student-form-card">

        <h1>Add Subject</h1>

        <form method="POST">

            <input
            type="text"
            name="subject_name"
            placeholder="Subject Name"
            required>

            <input
            type="text"
            name="class_name"
            placeholder="Class Name"
            required>

            <input
            type="text"
            name="subject_teacher"
            placeholder="Subject Teacher"
            required>

            <button type="submit">

                Add Subject

            </button>

        </form>

    </div>

</div>

</body>
</html>
