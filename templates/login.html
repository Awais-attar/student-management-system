<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/login.css') }}">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>Teacher Login</h1>

        <p>Welcome Back 👋</p>

        <form method="POST">

            <input
            type="email"
            name="email"
            placeholder="Email"
            required>

            <input
            type="password"
            name="password"
            placeholder="Password"
            required>

            <button type="submit">

                Login

            </button>

        </form>

        <!-- FORGOT PASSWORD -->

        <div style="margin-top:15px;">

            <a href="/forgot-password"
            style="color:#93c5fd;">

                Forgot Password?

            </a>

        </div>

        <br>

        <!-- REGISTER -->

        <a href="/register"
        style="color:white;">

            Create Account

        </a>

    </div>

</div>

</body>
</html>
