<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Timetable</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/attendance.css') }}">

</head>

<body>

<div class="report-container">

    <h1>Class Timetable</h1>

    <table>

        <tr>

            <th>Class</th>
            <th>Subject</th>
            <th>Teacher</th>
            <th>Period</th>
            <th>Time</th>

        </tr>

        {% for item in timetable %}

        <tr>

            <td>{{ item.class_name }}</td>

            <td>{{ item.subject_name }}</td>

            <td>{{ item.teacher_name }}</td>

            <td>{{ item.period_number }}</td>

            <td>{{ item.period_time }}</td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
