<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Add Announcement</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/students.css') }}">

    <style>

        .back-btn{
            display:inline-block;
            margin-bottom:20px;
            background:#2563eb;
            color:white;
            padding:10px 15px;
            text-decoration:none;
            border-radius:5px;
        }

    </style>

</head>

<body>

<div class="student-form-container">

    <div class="student-form-card">

        <a href="/admin-dashboard"
        class="back-btn">

            ← Back Dashboard

        </a>

        <h1>📢 Post Announcement</h1>

        <form method="POST">

            <input
            type="text"
            name="title"
            placeholder="Announcement Title"
            required>

            <textarea
            name="message"
            placeholder="Write announcement..."
            rows="6"
            required></textarea>

            <button type="submit">

                Post Announcement

            </button>

        </form>

    </div>

</div>

</body>
</html>
