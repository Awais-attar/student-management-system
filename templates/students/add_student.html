<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Add Student</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/students.css') }}">

</head>

<body>

<div class="student-form-container">

    <div class="student-form-card">

        <h1>Add Student</h1>

        <form method="POST"
enctype="multipart/form-data">

            <input
            type="text"
            name="full_name"
            placeholder="Student Name"
            required>

            <input
            type="number"
            name="age"
            placeholder="Age"
            required>

            <select name="gender">

                <option value="Male">
                    Male
                </option>

                <option value="Female">
                    Female
                </option>

            </select>

            <input
            type="text"
            name="student_class"
            placeholder="Class"
            required>

            <input
            type="text"
            name="parent_phone"
            placeholder="Parent Phone"
            required>
            <input
            type="file"
            name="student_image"
            required> 
            <button type="submit">

                Add Student

            </button>

        </form>

    </div>

</div>

</body>
</html>
